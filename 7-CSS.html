<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style2.css">

    <!-- Embedded CSS -->
    <style>
        h2{
            color: blue;
            text-align: center;
        }

        p{
            font-size: 18px;
            color: green;
        }
    </style>

</head>

<body>

<h1 style="color:red; text-align:center;">Inline CSS Example</h1>

<h2>Embedded CSS Example</h2>

<p>This paragraph is styled using embedded CSS.</p>

<h3 class="external">External CSS Example</h3>

</body>
</html>
